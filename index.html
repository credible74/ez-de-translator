<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Deutsch–Jesidisch Übersetzer</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
            padding: 28px 28px 20px 28px;
            color: white;
        }
        .header h1 {
            margin: 0 0 6px 0;
            font-weight: 600;
            font-size: 1.9rem;
        }
        .header p {
            margin: 0;
            opacity: 0.85;
            font-size: 0.95rem;
        }
        .status-badge {
            display: inline-block;
            background: #facc15;
            color: #1e293b;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 14px;
        }
        .content {
            padding: 28px;
        }
        .input-group {
            margin-bottom: 24px;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #0f172a;
            display: block;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: inherit;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            resize: vertical;
            background: #ffffff;
        }
        textarea:focus {
            outline: none;
            border-color: #2a5a3a;
            box-shadow: 0 0 0 3px rgba(42, 90, 58, 0.2);
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }
        button {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary {
            background: #2a5a3a;
            color: white;
        }
        button.primary:hover {
            background: #1e4630;
            transform: scale(0.97);
        }
        button.secondary {
            background: #e9eef3;
        }
        button.secondary:hover {
            background: #dee4ec;
        }
        .result-card {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #eef2f6;
        }
        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #3b5c48;
            margin-bottom: 8px;
        }
        .result-text {
            font-size: 1.2rem;
            line-height: 1.4;
            word-break: break-word;
            font-weight: 500;
            color: #0f172a;
        }
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a91;
            border-top: 1px solid #eef2f8;
            padding: 18px 28px 22px;
            background: #ffffff;
        }
        .error {
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        @media (max-width: 550px) {
            .content { padding: 20px; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🇩🇪 ↔️ 🇽🇰 Deutsch–Jesidisch</h1>
        <p>Übersetzung mit Google Sheets-Wörterbuch</p>
        <div class="status-badge" id="sheetStatus">📡 Lade Wörterbuch...</div>
    </div>

    <div class="content">
        <div class="input-group">
            <label>📝 Deutscher Text (Wort / Satz)</label>
            <textarea id="germanInput" rows="2" placeholder="z. B. Hallo, wie geht es dir?"></textarea>
        </div>

        <div class="button-group">
            <button class="primary" id="translateBtn">✨ Übersetzen</button>
            <button class="secondary" id="swapBtn">🔄 Beispiel laden</button>
            <button class="secondary" id="clearBtn">🗑️ Leeren</button>
        </div>

        <div class="result-card">
            <div class="result-label">🪶 JESIDISCH</div>
            <div class="result-text" id="translationOutput">—</div>
        </div>
    </div>
    <div class="footer">
        ⚡ Basis: Google Sheet (deutsch ↔ jesidisch) • Fehlende Wörter werden automatisch ergänzt
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. Google Sheet Konfiguration
    // --------------------------------------------------------------
    const SHEET_ID = "1haD4IVA8lNqoUsnrMrnEHhf5iJIGVXGfTWWu5XxevJY";
    const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
    
    let dictionary = new Map(); // deutsch -> jesidisch
    let loadingPromise = null;
    
    // --------------------------------------------------------------
    // 2. Exakte Buchstaben-Konvertierung: Kurdisch → Jesidisch
    //    gemäß Tabelle (links jesidisch, rechts kurdisch)
    // --------------------------------------------------------------
    function convertKurdishToYezidi(text) {
        if (!text) return "";
        
        // Zuerst alle nicht-lateinischen Zeichen entfernen (arabische Buchstaben etc.)
        // Erlaubt: A-Z a-z, Akzente (Áá Éé), Sonderzeichen (Šš), und die Kombinationen Ch, Kh, Oo
        let cleaned = text.replace(/[^\u0041-\u005A\u0061-\u007A\u00C1\u00E1\u00C9\u00E9\u0160\u0161\u00C7\u00E7\u00DB\u00FB\u00CE\u00EE\u00D4\u00F4]/g, '');
        // Falls dadurch Buchstaben verloren gehen, die eigentlich bleiben sollen (z.B. Û), werden sie einzeln behandelt.
        
        // Ersetzungstabelle (längere Ziele zuerst)
        const replacementRules = [
            // Kombinationen, die aus einem Zeichen zwei machen
            { from: "Ç", to: "Ch" }, { from: "ç", to: "ch" },
            { from: "Ş", to: "Š" }, { from: "ş", to: "š" },
            { from: "X", to: "Kh" }, { from: "x", to: "kh" },
            { from: "Û", to: "Oo" }, { from: "û", to: "oo" },
            { from: "Ê", to: "É" }, { from: "ê", to: "é" },
            { from: "Î", to: "I" }, { from: "î", to: "i" },
            // Einzelbuchstaben
            { from: "E", to: "A" }, { from: "e", to: "a" },
            { from: "I", to: "E" }, { from: "i", to: "e" },
            { from: "A", to: "Á" }, { from: "a", to: "á" }   // A nur wenn es vom Kurdischen kommt? Wir ersetzen, aber Vorsicht
        ];
        
        let result = cleaned;
        for (let rule of replacementRules) {
            result = result.split(rule.from).join(rule.to);
        }
        
        // Nachbearbeitung: Keine automatische w->v Ersetzung; aber falls der Benutzer in der Tabelle "Slav" -> "Sláv" hat, wird das direkt gezogen.
        return result;
    }
    
    // --------------------------------------------------------------
    // 3. Google Sheet laden
    // --------------------------------------------------------------
    async function loadSheetDictionary() {
        if (loadingPromise) return loadingPromise;
        loadingPromise = (async () => {
            try {
                const statusDiv = document.getElementById("sheetStatus");
                statusDiv.innerHTML = "🔄 Lade Wörterbuch...";
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/);
                if (rows.length < 2) throw new Error("Keine Datenzeilen");
                for (let i = 1; i < rows.length; i++) {
                    const line = rows[i].trim();
                    if (line === "") continue;
                    let cells = [];
                    let inQuote = false;
                    let current = "";
                    for (let ch of line) {
                        if (ch === '"') {
                            inQuote = !inQuote;
                        } else if (ch === ',' && !inQuote) {
                            cells.push(current);
                            current = "";
                        } else {
                            current += ch;
                        }
                    }
                    cells.push(current);
                    if (cells.length >= 2) {
                        let german = cells[0].replace(/^"|"$/g, '').trim().toLowerCase();
                        let yezidi = cells[1].replace(/^"|"$/g, '').trim();
                        if (german && yezidi) {
                            dictionary.set(german, yezidi);
                        }
                    }
                }
                document.getElementById("sheetStatus").innerHTML = `✅ Wörterbuch geladen (${dictionary.size} Einträge)`;
            } catch (err) {
                console.error(err);
                document.getElementById("sheetStatus").innerHTML = "⚠️ Wörterbuch nicht erreichbar – nutze automatische Ergänzung";
            }
        })();
        return loadingPromise;
    }
    
    // --------------------------------------------------------------
    // 4. Fallback: Deutsch -> Kurdisch (Kurmanji) via myMemory API
    //    Anschließend Umwandlung nach Jesidisch
    // --------------------------------------------------------------
    async function translateGermanToKurdish(germanText) {
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(germanText)}&langpair=de|ku`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data && data.responseData && data.responseData.translatedText) {
                let translation = data.responseData.translatedText;
                if (translation && translation.toLowerCase() !== germanText.toLowerCase()) {
                    return translation;
                }
            }
            // Fallback LibreTranslate (optional)
            const libreUrl = "https://translate.mentality.rip/translate";
            const libreResp = await fetch(libreUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    q: germanText,
                    source: "de",
                    target: "ku",
                    format: "text"
                })
            });
            if (libreResp.ok) {
                const libreData = await libreResp.json();
                if (libreData && libreData.translatedText) return libreData.translatedText;
            }
            return null;
        } catch (err) {
            console.warn("API-Fehler", err);
            return null;
        }
    }
    
    // --------------------------------------------------------------
    // 5. Hauptlogik: Übersetzung mit Wörterbuch oder API
    // --------------------------------------------------------------
    async function translatePhrase(germanSentence) {
        if (!germanSentence.trim()) return "";
        const lowerSentence = germanSentence.toLowerCase().trim();
        
        // 1. Exakter Satz im Wörterbuch?
        if (dictionary.has(lowerSentence)) {
            return dictionary.get(lowerSentence);
        }
        
        // 2. Wort-für-Wort-Übersetzung (falls alle Wörter einzeln bekannt)
        const words = germanSentence.split(/(\s+|[.,!?;:])/);
        let allKnown = true;
        let translatedParts = [];
        for (let token of words) {
            if (/^\s+$/.test(token) || /^[.,!?;:]+$/.test(token)) {
                translatedParts.push(token);
                continue;
            }
            const lowerToken = token.toLowerCase();
            if (dictionary.has(lowerToken)) {
                translatedParts.push(dictionary.get(lowerToken));
            } else {
                allKnown = false;
                break;
            }
        }
        if (allKnown && translatedParts.length > 0) {
            // Zusammensetzen, aber keine weitere Konvertierung nötig (Wörterbuch ist bereits jesidisch)
            return translatedParts.join('');
        }
        
        // 3. Fallback: gesamten Satz über API übersetzen (Kurdisch) und dann umwandeln
        const kurdishTranslation = await translateGermanToKurdish(germanSentence);
        if (kurdishTranslation) {
            return convertKurdishToYezidi(kurdishTranslation);
        }
        
        return "[Übersetzung fehlgeschlagen]";
    }
    
    // --------------------------------------------------------------
    // UI
    // --------------------------------------------------------------
    let isTranslating = false;
    const translateBtn = document.getElementById("translateBtn");
    const inputField = document.getElementById("germanInput");
    const outputDiv = document.getElementById("translationOutput");
    
    async function performTranslation() {
        if (isTranslating) return;
        const text = inputField.value.trim();
        if (!text) {
            outputDiv.innerHTML = "✏️ Bitte deutschen Text eingeben.";
            return;
        }
        isTranslating = true;
        translateBtn.disabled = true;
        translateBtn.innerHTML = '<span class="loader"></span> Übersetze...';
        outputDiv.innerHTML = "Wird übersetzt...";
        
        try {
            await loadSheetDictionary();
            const result = await translatePhrase(text);
            outputDiv.innerHTML = escapeHtml(result);
        } catch (err) {
            console.error(err);
            outputDiv.innerHTML = "⚠️ Fehler bei der Übersetzung.";
        } finally {
            isTranslating = false;
            translateBtn.disabled = false;
            translateBtn.innerHTML = '✨ Übersetzen';
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function loadExample() {
        inputField.value = "Hallo, wie geht es dir?";
        performTranslation();
    }
    
    function clearAll() {
        inputField.value = "";
        outputDiv.innerHTML = "—";
    }
    
    translateBtn.addEventListener("click", performTranslation);
    document.getElementById("swapBtn").addEventListener("click", loadExample);
    document.getElementById("clearBtn").addEventListener("click", clearAll);
    
    loadSheetDictionary().catch(console.warn);
</script>
</body>
</html>
